name: 🇫🇷 Build France Pour Tous APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Flutter Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🦋 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔧 Write local.properties for Android
        run: |
          FLUTTER_SDK=$(which flutter | xargs dirname | xargs dirname)
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_SDK" >> android/local.properties
          echo "flutter.buildMode=debug" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          cat android/local.properties

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos

      - name: 🏗️ Build Debug APKs (split per ABI)
        run: flutter build apk --debug --split-per-abi

      - name: 🏗️ Build Release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: 📤 Upload Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: france-pour-tous-debug
          path: build/app/outputs/flutter-apk/*debug*.apk
          retention-days: 30

      - name: 📤 Upload Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: france-pour-tous-release
          path: build/app/outputs/flutter-apk/*release*.apk
          retention-days: 90

      - name: 🚀 Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "🇫🇷 France Pour Tous — v${{ github.run_number }}"
          body: |
            ## 📱 France Pour Tous — Application bilingue FR/RU

            ### Installation APK
            Téléchargez le fichier `.apk` selon votre processeur :
            - `arm64-v8a` → smartphones modernes (2017+) ✅ **recommandé**
            - `armeabi-v7a` → anciens appareils Android
            - `x86_64` → émulateurs

            ### Contenu
            - 🔄 Toggle FR ↔ RU instantané sur tous les écrans
            - 📚 10 modules × 5 leçons = 50 leçons
            - 📝 Quiz interactifs (5 questions par leçon)
            - 🤝 Conseil d'Ami — codes sociaux invisibles
            - 📊 Dashboard de progression + streak
            - 📖 Glossaire thématique searchable
            - 🆘 Urgences (15, 17, 18, 112) & liens officiels
          files: |
            build/app/outputs/flutter-apk/*release*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
